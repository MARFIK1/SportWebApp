name: Daily predictions

on:
  workflow_dispatch:
    inputs:
      days_ahead:
        description: "Future days to predict"
        required: true
        default: "2"
      update_days_back:
        description: "Past days to update with final scores"
        required: true
        default: "1"
      skip_deploy:
        description: "Run pipeline without deploying to Vercel"
        required: true
        default: false
        type: boolean
      skip_predictions:
        description: "Only restore data, build, and deploy"
        required: true
        default: false
        type: boolean
  schedule:
    - cron: "30 0 * * *"

concurrency:
  group: daily-predictions-production
  cancel-in-progress: false

jobs:
  daily:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    env:
      DAYS_AHEAD: ${{ github.event.inputs.days_ahead || '2' }}
      UPDATE_DAYS_BACK: ${{ github.event.inputs.update_days_back || '1' }}
      GDRIVE_ROOT: gdrive:SportWebApp
      SKIP_VERCEL_DEPLOY: ${{ github.event.inputs.skip_deploy == 'true' && '1' || '0' }}
      SKIP_PREDICTIONS: ${{ github.event.inputs.skip_predictions == 'true' && '1' || '0' }}
      TZ: Europe/Warsaw
      SOFASCORE_HEADLESS: "1"
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Set up Python
        if: ${{ env.SKIP_PREDICTIONS != '1' }}
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: SofascoreData/requirements.txt

      - name: Install rclone
        run: |
          sudo apt-get update
          sudo apt-get install -y rclone

      - name: Configure rclone
        shell: bash
        run: |
          if [ -z "${{ secrets.RCLONE_CONFIG_B64 }}" ]; then
            echo "Missing GitHub secret: RCLONE_CONFIG_B64"
            exit 1
          fi
          mkdir -p "$HOME/.config/rclone"
          printf '%s' "${{ secrets.RCLONE_CONFIG_B64 }}" | base64 -d > "$HOME/.config/rclone/rclone.conf"
          rclone lsd "$GDRIVE_ROOT"

      - name: Restore Vercel project link
        shell: bash
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          if [ -z "$VERCEL_ORG_ID" ] || [ -z "$VERCEL_PROJECT_ID" ]; then
            echo "Missing VERCEL_ORG_ID or VERCEL_PROJECT_ID secret"
            exit 1
          fi
          mkdir -p .vercel
          printf '{"orgId":"%s","projectId":"%s"}\n' "$VERCEL_ORG_ID" "$VERCEL_PROJECT_ID" > .vercel/project.json

      - name: Restore data from Google Drive
        shell: bash
        run: |
          mkdir -p SofascoreData/data SofascoreData/reports SofascoreData/top_picks
          rclone copy "$GDRIVE_ROOT/SofascoreData/data" SofascoreData/data --create-empty-src-dirs --progress --fast-list --transfers 8 --checkers 16
          rclone copy "$GDRIVE_ROOT/SofascoreData/reports" SofascoreData/reports --create-empty-src-dirs --progress --fast-list --transfers 8 --checkers 16 || true
          rclone copy "$GDRIVE_ROOT/SofascoreData/top_picks" SofascoreData/top_picks --create-empty-src-dirs --progress --fast-list --transfers 8 --checkers 16 || true

      - name: Install Node dependencies
        run: npm ci

      - name: Install Python dependencies
        if: ${{ env.SKIP_PREDICTIONS != '1' }}
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r SofascoreData/requirements.txt

      - name: Run daily prediction pipeline
        if: ${{ env.SKIP_PREDICTIONS != '1' }}
        shell: pwsh
        run: ./scripts/daily-predictions.ps1 -DaysAhead $env:DAYS_AHEAD -UpdateDaysBack $env:UPDATE_DAYS_BACK -Python "python" -SkipBuild -SkipDeploy

      - name: Persist updated data to Google Drive
        if: ${{ env.SKIP_PREDICTIONS != '1' && success() }}
        shell: bash
        run: |
          rclone sync SofascoreData/data "$GDRIVE_ROOT/SofascoreData/data" --progress --fast-list --transfers 8 --checkers 16 --exclude "__pycache__/**"
          rclone sync SofascoreData/reports "$GDRIVE_ROOT/SofascoreData/reports" --progress --fast-list --transfers 8 --checkers 16 --exclude "__pycache__/**"
          rclone sync SofascoreData/top_picks "$GDRIVE_ROOT/SofascoreData/top_picks" --progress --fast-list --transfers 8 --checkers 16 --exclude "__pycache__/**"

      - name: Build production bundle
        run: npm run build:prod

      - name: Deploy to Vercel
        if: ${{ env.SKIP_VERCEL_DEPLOY != '1' }}
        run: npm run deploy:vercel
